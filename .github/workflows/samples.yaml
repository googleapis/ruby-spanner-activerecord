name: samples

permissions:
  contents: read

on:
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      max-parallel: 4
      matrix:
        ruby: ["3.2", "3.3", "3.4", "4.0"]
        ar: ["~> 7.0.0", "~> 7.1.0", "~> 7.2.0", "~> 8.0.0"]
        # Exclude combinations that are not supported.
        exclude:
          - ruby: "3.4"
            ar: "~> 7.0.0"
          - ruby: "3.4"
            ar: "~> 7.1.0"
          - ruby: "3.4"
            ar: "~> 7.2.0"
          - ruby: "4.0"
            ar: "~> 7.0.0"
          - ruby: "4.0"
            ar: "~> 7.1.0"
          - ruby: "4.0"
            ar: "~> 7.2.0"
    env:
      AR_VERSION: ${{ matrix.ar }}
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false
    - name: Set up Ruby
      uses: ruby/setup-ruby@6e5d382445ae5590b7449d8b3bc8cb1c2c27f617 # v1.317.0
      with:
        bundler-cache: false
        ruby-version: ${{ matrix.ruby }}
    - name: Install dependencies
      run: bundle install
    - name: Run samples
      run: bundle exec rake all
      working-directory: examples/snippets
